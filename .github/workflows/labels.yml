name: Promote crowd labels (PR only)

# Reads crowd-sourced recognition labels from Supabase (service_role secret) and
# runs the anti-poisoning gates (consensus K + conflict + redundancy + already-seeded),
# then splits survivors into SAFE (unambiguous: the nearest catalog ref IS the promoted
# item, no different-named look-alike label sits near it, and risk-based K/time-dispersion
# hold) vs QUARANTINE (held for more consensus / manual review). Only Safe is promoted;
# it is offender-trimmed to ZERO new mis-IDs, montage-reviewed, and opened as a PR.
# With the auto_merge input the Safe PR is merged automatically (Quarantine is NEVER
# auto-merged). Trigger manually (Actions tab) or via the weekly cron (best-effort).

on:
  workflow_dispatch:
    inputs:
      k:
        description: "min distinct agreeing submissions to promote"
        default: "3"
      auto_merge:
        description: "auto-merge the Safe PR (Quarantine is always held for review)"
        type: boolean
        default: false
  schedule:
    - cron: "17 3 * * 1"   # Mondays ~03:17 UTC, best-effort

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: promote-labels
  cancel-in-progress: false

jobs:
  promote:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install numpy pillow
      - name: Save pre-promotion seed (baseline for offender-trim)
        run: cp data/learned_seed.json /tmp/baseline_seed.json
      - name: Run promotion gates
        id: promote
        env:
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python scripts/promote_labels.py --k "${{ github.event.inputs.k || '3' }}" --safe-only | tee /tmp/promote.log

      # Drop every NEW cluster that creates a confident WRONG id (any item, any
      # price), iterating until the batch adds ZERO new mis-IDs. Enforces the
      # 100%-accuracy / no-false-positive policy mechanically — see trim_offenders.py.
      - name: Offender-trim to zero new mis-IDs
        id: trim
        if: steps.promote.outputs.promoted != '0' && steps.promote.outputs.promoted != ''
        env:
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          set -o pipefail   # fail the job if trim can't reach 0 new mis-IDs
          python scripts/trim_offenders.py \
            --baseline /tmp/baseline_seed.json \
            --candidate data/learned_seed.json \
            --out data/learned_seed.json \
            --manifest review_manifest.json | tee /tmp/trim.log

      - name: Bump release so the labels reach returning visitors
        if: steps.trim.outputs.survivors != '0' && steps.trim.outputs.survivors != ''
        run: python scripts/bump_release.py

      - name: Render visual review montages
        id: review
        if: steps.trim.outputs.survivors != '0' && steps.trim.outputs.survivors != ''
        run: python scripts/render_review.py

      - name: Publish review images to the review-assets branch
        if: steps.trim.outputs.survivors != '0' && steps.trim.outputs.survivors != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          test -d review || exit 0
          tmp="$(mktemp -d)"
          cp -r review "$tmp/review"
          cd "$tmp"
          git init -q -b review-assets
          git config user.email "actions@github.com"
          git config user.name "github-actions[bot]"
          git add review
          git commit -qm "label review images"
          git push -f "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" review-assets

      - name: Build PR body
        if: steps.trim.outputs.survivors != '0' && steps.trim.outputs.survivors != ''
        run: |
          {
            echo "PR_BODY<<PREOF"
            echo "Auto-generated from Supabase crowd labels (gates: consensus K / conflict / redundancy / already-seeded), then **offender-trimmed to ZERO new mis-IDs** (trim_offenders.py)."
            echo ""
            cat pr_body_review.md
            echo ""
            echo "<details><summary>offender-trim log (kept survivors / dropped over-greedy clusters)</summary>"
            echo ""
            echo '```'
            cat /tmp/trim.log
            echo '```'
            echo "</details>"
            echo ""
            echo "<details><summary>gate log</summary>"
            echo ""
            echo '```'
            cat /tmp/promote.log
            echo '```'
            echo "</details>"
            echo ""
            echo "**Review before merging.** Appends to \`data/learned_seed.json\` + bumps the version so it ships to returning visitors. The price bot's prices/history are untouched, so no conflict/revert. The user's LOCAL labels still override on their machine."
            echo "PREOF"
          } >> "$GITHUB_ENV"

      - name: Open PR if learned_seed.json changed
        id: cpr
        if: steps.trim.outputs.survivors != '0' && steps.trim.outputs.survivors != ''
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          add-paths: |
            data/learned_seed.json
            js/app.js
            js/detect.js
            js/pipeline.js
            js/i18n.js
            js/recognize.js
            index.html
          branch: crowd-labels/auto-promote
          delete-branch: true
          commit-message: "Promote crowd labels (Safe only; offender-trimmed: zero new mis-IDs)"
          title: "${{ steps.review.outputs.has_flags == 'true' && '⚠ Crowd labels (Safe, 0 new mis-IDs): review montages' || 'Crowd labels (Safe, offender-trimmed: zero new mis-IDs)' }}"
          body: ${{ env.PR_BODY }}
          labels: crowd-labels

      # Auto-merge ONLY the Safe PR, and ONLY when explicitly asked (auto_merge input).
      # Quarantine never reaches here (promote --safe-only holds it). The job already
      # failed if trim left any new mis-ID, so reaching this step means mis-delta <= 0.
      - name: Auto-merge the Safe PR
        id: automerge
        if: >-
          github.event.inputs.auto_merge == 'true'
          && steps.trim.outputs.survivors != '0' && steps.trim.outputs.survivors != ''
          && steps.cpr.outputs.pull-request-number != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "auto-merging Safe PR #${{ steps.cpr.outputs.pull-request-number }} (quarantine held: ${{ steps.promote.outputs.quarantine }})"
          gh pr merge "${{ steps.cpr.outputs.pull-request-number }}" --merge --repo "$GITHUB_REPOSITORY"

      - name: Notify Discord — auto-merged
        if: steps.automerge.outcome == 'success'
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          [ -z "$DISCORD_WEBHOOK" ] && exit 0
          jq -n --arg c "✅ **クラウドラベル昇格**：Safe PR #${{ steps.cpr.outputs.pull-request-number }} を自動マージしました（Quarantine保留: ${{ steps.promote.outputs.quarantine }}件 / Safe: ${{ steps.trim.outputs.survivors }}件）。$RUN_URL" '{content:$c}' \
            | curl -s -H "Content-Type: application/json" --data-binary @- "$DISCORD_WEBHOOK"

      - name: Notify Discord — failure
        if: failure()
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          [ -z "$DISCORD_WEBHOOK" ] && exit 0
          jq -n --arg c "❌ **クラウドラベル昇格が失敗**（${{ github.ref_name }}）。offender-trimが0に到達できない/スクリプトエラー等の可能性。自動マージはされていません。要確認 → $RUN_URL" '{content:$c}' \
            | curl -s -H "Content-Type: application/json" --data-binary @- "$DISCORD_WEBHOOK"
