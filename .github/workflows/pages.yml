# GitHub Pages deploy via Actions — REPLACES the built-in "pages build and
# deployment" (classic branch deploy). WHY: the classic builder runs with no
# concurrency guard, so the price bot's ~8-min deploy-key pushes occasionally
# raced each other and one lost with "Deployment failed, try again later."
# Harmless to the site (the next push always redeployed) but it spammed FAILURE
# emails. A workflow-based deploy lets us serialise deploys with a concurrency
# group, so overlapping deploys QUEUE instead of colliding -> no more failures.
#
# The site still redeploys on EVERY push to main (data pushes included), so the
# ~10-min price snapshots stay fresh — same freshness as before, just no races.
#
# One-time switch that enables this: Pages build_type = "workflow" (done via the
# API / Settings -> Pages -> Source: GitHub Actions). To revert to the classic
# builder, set Source back to "Deploy from a branch" (main / root).
name: pages-deploy
on:
  push:
    branches: [main]        # every push (incl. the price-bot SSH deploy-key
                            # pushes, which DO fire push events) redeploys
  workflow_dispatch:        # manual redeploy / first deploy after the switch
permissions:
  contents: read
  pages: write
  id-token: write
# Serialise deploys: at most one running + one pending; a newer push supersedes
# the pending one. cancel-in-progress:false so an in-flight publish is never cut
# mid-way (GitHub's recommended setting for Pages). Separate group from the
# price chain's `prices`, so the two never block each other.
concurrency:
  group: pages
  cancel-in-progress: false
jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      # Static URL: the deploy step is retried (see below) so no single step id is
      # guaranteed to hold page_url; the site URL is fixed anyway.
      url: https://tkh54.github.io/tbh-appraiser/
    steps:
      - uses: actions/checkout@v5
      - uses: actions/configure-pages@v5
      # Serve the repo root (identical to the old branch "/" deploy) but stage
      # into _site MINUS .git, so the artifact isn't bloated by the large,
      # frequently-churned binary history (prices/history/learned_seed).
      - name: Stage site (repo root, excluding VCS)
        run: |
          mkdir -p _site
          rsync -a --exclude='.git' --exclude='_site' ./ _site/
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      # actions/deploy-pages intermittently returns "Deployment failed, try again
      # later." from the Pages backend when deploys arrive in quick succession
      # (our ~10-min data pushes): the concurrency group serialises the *jobs*,
      # but the backend can still be settling the previous deployment when the
      # next one is created. It's transient — a retry almost always wins — but an
      # unretried failure marks the run red and spams a FAILURE email. So try up
      # to 3 times (with a short settle delay), and only let the run go red if a
      # genuine, persistent error survives all attempts. Site content is
      # unchanged either way; each attempt redeploys the same artifact.
      - id: deploy1
        uses: actions/deploy-pages@v4
        continue-on-error: true
      - name: Settle before retry 1
        if: steps.deploy1.outcome == 'failure'
        run: sleep 30
      - id: deploy2
        if: steps.deploy1.outcome == 'failure'
        uses: actions/deploy-pages@v4
        continue-on-error: true
      - name: Settle before retry 2
        if: steps.deploy1.outcome == 'failure' && steps.deploy2.outcome == 'failure'
        run: sleep 45
      - id: deploy3
        if: steps.deploy1.outcome == 'failure' && steps.deploy2.outcome == 'failure'
        uses: actions/deploy-pages@v4

      - name: Notify Discord on failure
        if: failure()
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          [ -z "$DISCORD_WEBHOOK" ] && exit 0
          jq -n --arg c "❌ **Pagesデプロイが失敗**（3回リトライ後）。サイトへの反映が停止した可能性 → $RUN_URL" '{content:$c}' | curl -s -H "Content-Type: application/json" --data-binary @- "$DISCORD_WEBHOOK"
