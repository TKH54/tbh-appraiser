# Self-chaining price refresh (near-real-time prices, no PC needed). Each run:
#   1. FAST: sweep EVERY item's lowest ask + listing count (~1-2 min) and write
#      prices.json — so the displayed `t` advances every cycle.
#   2. DETAIL: refresh median + 24h volume for a small rotating shard
#      (PRICES_SHARD, default 60) — the whole catalog cycles every ~1h.
# It then COMMITS VIA THE DEPLOY KEY (SSH). Unlike GITHUB_TOKEN pushes, deploy-key
# pushes fire `push` events, so every snapshot triggers the next run — a
# continuous ~10-min loop hosted entirely on GitHub. A run normally finishes in
# ~5-7 min (well under timeout-minutes); the cron is a best-effort RESTARTER if a
# run ever fails to push.
#
# Stop the chain: Actions tab -> price-snapshot -> "..." -> Disable workflow.
# Restart it:     enable + Run workflow (leave inputs empty).
# One-shot full median/volume backfill: Run workflow with shard=742 delay=3.0.
name: price-snapshot
on:
  push:
    branches: [main]              # the chain link: every bot (deploy-key) push fires the
                                  # next run; human pushes just splice into the same chain
  schedule:
    - cron: "1,11,21,31,41,51 * * * *"   # best-effort restarter: every 10 min so a
                                         # broken chain self-heals fast. Harmless when
                                         # healthy — concurrency folds it into the chain.
  workflow_dispatch:              # manual run / chain starter
    inputs:
      force_unlocked:
        description: "market-reopened flag: 1=force on, 0=force off, empty=auto-detect"
        required: false
        default: ""
      shard:
        description: "items to refresh median/volume this run (empty=default 60; set high e.g. 742 for a one-shot full backfill)"
        required: false
        default: ""
      delay:
        description: "per-item pacing seconds (empty=default 2.5; raise if you see 429s)"
        required: false
        default: ""
      budget_sec:
        description: "wall-clock cap for the median/volume pass (empty=default 600; raise for a big backfill)"
        required: false
        default: ""
permissions:
  contents: write
concurrency:
  group: prices                   # exactly one running + one pending; extras are replaced
  cancel-in-progress: false
jobs:
  snapshot:
    runs-on: ubuntu-latest
    timeout-minutes: 20          # a normal run is ~5-7 min; this is margin for a
                                 # throttled detail pass (PRICES_BUDGET_SEC=600).
                                 # Tight enough that a truly stuck run is killed
                                 # fast so the chain self-heals.
    steps:
      - uses: actions/checkout@v5
        with:
          ssh-key: ${{ secrets.DEPLOY_KEY }}   # push via SSH so the push event fires
      - uses: actions/setup-python@v6
        with: { python-version: "3.12" }
      - run: pip install requests
      - name: pace the loop (~10-min cadence; immediate on manual dispatch)
        # build is ~5-7 min; this short pace brings the cycle to ~7-9 min without
        # the old 9-min idle that made each run overshoot 10 min.
        if: github.event_name != 'workflow_dispatch'
        run: sleep 120
      - name: snapshot prices (failure must not break the chain)
        # PHASE 1 sweeps EVERY item's lowest ask/listing and writes prices.json
        # fast; PHASE 2 refreshes a rotating shard's median/volume (PRICES_SHARD).
        # Progress (items/offset/refreshed/elapsed) is logged to stderr.
        run: python scripts/build_prices.py || echo "::warning::price build failed; sending keepalive"
        env:
          FORCE_UNLOCKED: ${{ github.event.inputs.force_unlocked }}
          PRICES_SHARD: ${{ github.event.inputs.shard }}
          PRICES_DELAY: ${{ github.event.inputs.delay }}
          PRICES_BUDGET_SEC: ${{ github.event.inputs.budget_sec }}
      - name: commit and push (this push triggers the next run)
        run: |
          git config user.name "price-bot"
          git config user.email "actions@users.noreply.github.com"
          # the run is pinned to its trigger-time SHA, so the branch tip may have
          # moved (newer snapshot or a code push). prices.json is regenerated from
          # scratch every run — never rebase it (conflicts killed run 10:06Z);
          # instead take the remote tip and lay the fresh snapshot on top.
          cp data/prices.json /tmp/prices.json
          cp data/history.json /tmp/history.json
          for i in 1 2 3; do
            git fetch origin "${GITHUB_REF_NAME}"
            git reset --hard "origin/${GITHUB_REF_NAME}"
            cp /tmp/prices.json data/prices.json
            cp /tmp/history.json data/history.json
            git add data/prices.json data/history.json
            # always create a commit — an empty keepalive keeps the chain alive
            # through Steam outages (any push to main fires the next link)
            git diff --cached --quiet && git commit --allow-empty -m "price keepalive" \
              || git commit -m "price snapshot"
            git push origin "HEAD:${GITHUB_REF_NAME}" && exit 0
            sleep 5
          done
          echo "::error::push failed 3 times"; exit 1

      - name: Notify Discord on failure
        if: failure()
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          [ -z "$DISCORD_WEBHOOK" ] && exit 0
          jq -n --arg c "❌ **価格スナップショットCIが失敗**。価格の自動更新チェーンが停止した可能性（価格が固まる）。再開が必要かも → $RUN_URL" '{content:$c}' | curl -s -H "Content-Type: application/json" --data-binary @- "$DISCORD_WEBHOOK"
