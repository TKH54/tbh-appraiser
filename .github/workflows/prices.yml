# POLITE price refresh (near-real-time prices, no PC needed). Steam blocks the shared
# GitHub Actions IP range, so this bot self-throttles rather than hammering. Each run:
#   1. FAST: sweep EVERY item's lowest ask + listing count and write prices.json —
#      so the displayed `t` advances (~10-min healthy cadence).
#   2. DETAIL: refresh median + 24h volume for a small rotating shard (PRICES_SHARD,
#      default 25) — the whole catalog cycles over a few hours.
#
# Cadence model (see scripts/build_prices.py _gate/_on_failure/_heartbeat):
#   - The chain is a SELF-RESTARTING loop: every push (deploy-key SSH) fires the next
#     run. GitHub's cron does NOT fire reliably on this push-busy repo, so we must not
#     depend on it — the loop restarts itself.
#   - SUCCESS commits prices.json (paced ~3 min) -> fires the next run (~10-min chain).
#   - FAILURE (Steam unreachable) records an escalating cooldown (20->40->80->120 min)
#     in price_state.json. While cooling, each run HEARTBEATS: a state-only commit that
#     re-fires the chain WITHOUT hitting Steam, so Steam sees ~one hit per cooldown
#     instead of every run. pages.yml paths-ignore keeps heartbeats from redeploying.
#   - The */10 cron is only a backstop for the case where the chain ever fully dies.
#
# Stop the chain: Actions tab -> price-snapshot -> "..." -> Disable workflow.
# Force a run now: Run workflow (bypasses cooldown/pacing).
# One-shot full median/volume backfill: Run workflow with shard=742 delay=3.0.
name: price-snapshot
on:
  push:
    branches: [main]              # every push re-fires the chain (self-restart). The
                                  # cooldown GATE in build_prices.py — not the trigger —
                                  # keeps failures from hammering Steam.
  schedule:
    - cron: "*/10 * * * *"        # backstop restarter only (GitHub's cron is unreliable
                                  # here, so the chain self-restarts via the heartbeat)
  workflow_dispatch:              # manual run / chain starter (bypasses the gate)
    inputs:
      force_unlocked:
        description: "market-reopened flag: 1=force on, 0=force off, empty=auto-detect"
        required: false
        default: ""
      shard:
        description: "items to refresh median/volume this run (empty=default 60; set high e.g. 742 for a one-shot full backfill)"
        required: false
        default: ""
      delay:
        description: "per-item pacing seconds (empty=default 2.5; raise if you see 429s)"
        required: false
        default: ""
      budget_sec:
        description: "wall-clock cap for the median/volume pass (empty=default 600; raise for a big backfill)"
        required: false
        default: ""
permissions:
  contents: write
concurrency:
  group: prices                   # exactly one running + one pending; extras are replaced
  cancel-in-progress: false
jobs:
  snapshot:
    runs-on: ubuntu-latest
    timeout-minutes: 20          # a normal run is ~5-7 min; this is margin for a
                                 # throttled detail pass (PRICES_BUDGET_SEC=600).
                                 # Tight enough that a truly stuck run is killed
                                 # fast so the chain self-heals.
    steps:
      - uses: actions/checkout@v5
        with:
          ssh-key: ${{ secrets.DEPLOY_KEY }}   # push via SSH so the push event fires
      - uses: actions/setup-python@v6
        with: { python-version: "3.12" }
      - run: pip install requests
      - name: snapshot prices (self-throttling; failures cool down, never hammer)
        # build_prices.py gates itself (cooldown / cron-vs-chain / ~3-min push pacing),
        # sweeps EVERY item's lowest ask (PHASE 1) and refreshes a rotating median/
        # volume shard (PHASE 2). It ALWAYS exits 0: on a Steam block it records a
        # cooldown in price_state.json instead of failing. A non-zero exit here is a
        # genuine crash -> the job goes red and Discord fires. It writes /tmp/build_mode
        # = snapshot|stateonly|skip for the commit step below.
        run: python scripts/build_prices.py
        env:
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          FORCE_UNLOCKED: ${{ github.event.inputs.force_unlocked }}
          PRICES_SHARD: ${{ github.event.inputs.shard }}
          PRICES_DELAY: ${{ github.event.inputs.delay }}
          PRICES_BUDGET_SEC: ${{ github.event.inputs.budget_sec }}
      - name: commit and push (snapshot fires the chain; state-only is path-ignored)
        run: |
          MODE=$(cat /tmp/build_mode 2>/dev/null || echo skip)
          echo "build mode: $MODE"
          if [ "$MODE" = "skip" ]; then echo "nothing to commit this run"; exit 0; fi
          git config user.name "price-bot"
          git config user.email "actions@users.noreply.github.com"
          # the run is pinned to its trigger-time SHA, so the branch tip may have moved
          # (a concurrent snapshot or a code push). prices.json is regenerated from
          # scratch, so never rebase it — take the remote tip and lay our files on top.
          # A "stateonly" (failed) run stages price_state.json ONLY, so it can't clobber
          # a concurrent snapshot's prices.json.
          cp data/price_state.json /tmp/price_state.json
          if [ "$MODE" = "snapshot" ]; then
            cp data/prices.json /tmp/prices.json
            cp data/history.json /tmp/history.json
          fi
          for i in 1 2 3; do
            git fetch origin "${GITHUB_REF_NAME}"
            git reset --hard "origin/${GITHUB_REF_NAME}"
            cp /tmp/price_state.json data/price_state.json
            if [ "$MODE" = "snapshot" ]; then
              cp /tmp/prices.json data/prices.json
              cp /tmp/history.json data/history.json
              git add data/prices.json data/history.json data/price_state.json
              MSG="price snapshot"
            else
              git add data/price_state.json
              MSG="price cooldown/heartbeat"
            fi
            if git diff --cached --quiet; then echo "no change to commit"; exit 0; fi
            git commit -m "$MSG"
            git push origin "HEAD:${GITHUB_REF_NAME}" && exit 0
            sleep 5
          done
          echo "::error::push failed 3 times"; exit 1

      # Alert on CANCELLED too, not just failed: a GitHub-side cancellation (runner
      # lost / Actions outage / concurrency) skips the push AND a failure()-only
      # alert -> the chain dies SILENTLY (exactly what happened 2026-07-09). Firing
      # on cancelled() surfaces it so the chain can be re-fired. Best-effort: a hard
      # runner kill may not run this step, but soft cancels/failures will.
      - name: Notify Discord on failure/cancel
        if: failure() || cancelled()
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          [ -z "$DISCORD_WEBHOOK" ] && exit 0
          jq -n --arg c "⚠️ **価格スナップショットCIが失敗/キャンセル**。自動更新チェーンが止まった可能性（価格が固まる）。GitHub Actions障害時によく起きます。復旧後に \`gh workflow run prices.yml\` で再点火 → $RUN_URL" '{content:$c}' | curl -s -H "Content-Type: application/json" --data-binary @- "$DISCORD_WEBHOOK"
