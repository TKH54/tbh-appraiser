# Self-chaining price refresh (⑨ near-real-time prices, no PC needed):
# each run sleeps ~9 min, snapshots prices, then COMMITS VIA THE DEPLOY KEY
# (SSH). Unlike GITHUB_TOKEN pushes, deploy-key pushes fire `push` events, so
# every snapshot triggers the next run — a continuous ~10-min loop hosted
# entirely on GitHub. GitHub's cron proved near-dead on this repo (2 fires in
# 24h), so it remains only as a chain RESTARTER if a run ever fails to push.
#
# Stop the chain: Actions tab -> price-snapshot -> "..." -> Disable workflow.
# Restart it:     enable + Run workflow (leave inputs empty).
# Full refresh (median/volume, ~16 min) happens on the cycle where minute<10.
name: price-snapshot
on:
  push:
    branches: [main]              # the chain link: every bot (deploy-key) push fires the
                                  # next run; human pushes just splice into the same chain
  schedule:
    - cron: "11,41 * * * *"       # best-effort restarter only
  workflow_dispatch:              # manual run / chain starter
    inputs:
      force_unlocked:
        description: "market-reopened flag: 1=force on, 0=force off, empty=auto-detect"
        required: false
        default: ""
permissions:
  contents: write
concurrency:
  group: prices                   # exactly one running + one pending; extras are replaced
  cancel-in-progress: false
jobs:
  snapshot:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          ssh-key: ${{ secrets.DEPLOY_KEY }}   # push via SSH so the push event fires
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install requests
      - name: pace the loop (~10-min cadence; immediate on manual dispatch)
        if: github.event_name != 'workflow_dispatch'
        run: sleep 540
      - name: decide mode (full refresh once per hour, when minute < 10)
        id: mode
        run: |
          if [ "$(date -u +%M)" -lt 10 ]; then
            echo "fast=" >> "$GITHUB_OUTPUT"
          else
            echo "fast=1" >> "$GITHUB_OUTPUT"
          fi
      - name: snapshot prices (failure must not break the chain)
        run: python scripts/build_prices.py || echo "::warning::price build failed; sending keepalive"
        env:
          PRICES_FAST: ${{ steps.mode.outputs.fast }}
          FORCE_UNLOCKED: ${{ github.event.inputs.force_unlocked }}
      - name: commit and push (this push triggers the next run)
        run: |
          git config user.name "price-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/prices.json
          # always create a commit — an empty keepalive keeps the chain alive
          # through Steam outages (any push to main fires the next link)
          git diff --cached --quiet && git commit --allow-empty -m "price keepalive" \
            || git commit -m "price snapshot"
          git pull --rebase --autostash origin "${GITHUB_REF_NAME}"
          git push origin "HEAD:${GITHUB_REF_NAME}"
