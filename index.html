<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<!-- CSP: scripts only from self + GoatCounter (no inline scripts exist, so an
     injected <script> is blocked); network limited to our data, Supabase
     (insert-only crowd labels) and GoatCounter; images to self + Steam's CDN +
     blob/data (canvas & stock thumbnails). Hardens against XSS/injection. -->
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://gc.zgo.at; connect-src 'self' https://ebtaabxbfracykncjhfc.supabase.co https://tbh-appraiser.goatcounter.com https://gc.zgo.at; img-src 'self' https://*.steamstatic.com https://*.akamaihd.net data: blob:; style-src 'self' 'unsafe-inline'; base-uri 'self'; form-action 'none'; object-src 'none'">
<title>TBH 倉庫まるごと査定 — Warehouse Appraiser for Task Bar Hero</title>
<meta name="description" content="ゲーム画面を映すだけで Task Bar Hero の倉庫を丸ごと読み取り、全アイテムをSteamマーケット相場で自動査定する非公式ツール。インストール不要・画像はブラウザ内で処理され送信されません。">
<style>
  :root { color-scheme: dark; font-size: 125%; }   /* ② global 125% */
  * { box-sizing: border-box; }
  body { font-family: "Segoe UI", "Hiragino Sans", Meiryo, system-ui, sans-serif;
         background:#0d1117; color:#e6e9ef; margin:0; padding:1.2rem; }
  h1 { font-size:1.45rem; margin:0; letter-spacing:.02em;
       background:linear-gradient(90deg,#ffd166,#ff8fab,#a371f7,#6fb1ff);
       -webkit-background-clip:text; background-clip:text; color:transparent; }
  .tagline { color:#cdd6e4; font-size:1rem; font-weight:500; margin:.3rem 0 1rem; line-height:1.4; }
  /* quick-steps: step ① (open warehouse in-game) highlighted so it isn't missed */
  #quickSteps b { color:#ffd60a; font-weight:800; }
  button { background:#2d6cdf; color:#fff; border:0; padding:.55rem 1.1rem; border-radius:.5rem;
           font-size:.85rem; cursor:pointer; font-weight:700; font-family:inherit; }
  button:hover { filter:brightness(1.12); }
  button:disabled { opacity:.55; cursor:default; filter:none; }
  button.big { font-size:1rem; padding:.7rem 1.4rem; }
  button.accent { background:linear-gradient(135deg,#7048e8,#2d6cdf); }
  button.connected { background:#1f6f3f; }
  button.ghost { background:#21262d; color:#cdd6e4; font-weight:500; }
  /* next-step nudge: same yellow pulse as the review cells */
  button.cta { animation:ctaglow 1.2s ease-in-out infinite; }
  @keyframes ctaglow { 0%,100% { box-shadow:0 0 .25rem rgba(255,214,10,.55); }
                       50% { box-shadow:0 0 .85rem .25rem rgba(255,214,10,.95); } }
  /* after a scan, draw attention to the listing-plan button in PURPLE (only when the planner is live) */
  button.ctap { animation:ctapglow 1.2s ease-in-out infinite; }
  @keyframes ctapglow { 0%,100% { box-shadow:0 0 .35rem rgba(163,113,247,.6); }
                        50% { box-shadow:0 0 1rem .28rem rgba(163,113,247,1); } }
  select { background:#21262d; color:#cdd6e4; border:1px solid #30363d; border-radius:.4rem;
           padding:.35rem .5rem; font-size:.75rem; font-family:inherit; }
  .foot { color:#8b93a7; font-size:.72rem; }
  .muted { color:#6b7280; } .pos { color:#7ee787; } .neg { color:#ff7b72; }
  .topbar { display:flex; align-items:center; gap:.6rem; flex-wrap:wrap; }
  .topbar .sp { flex:1; }
  .pbar { display:inline-block; width:9rem; height:.5rem; background:#21262d; border-radius:.25rem;
          overflow:hidden; vertical-align:middle; margin:0 .4rem; }
  .pbar i { display:block; height:100%; background:linear-gradient(90deg,#2d6cdf,#6fb1ff); transition:width .25s; }

  /* ---- layout: capture left / results right, stacks on narrow (①) ---- */
  #cols { display:flex; gap:1.4rem; align-items:flex-start; flex-wrap:wrap; margin-top:1rem; }
  #capCol { flex:0 1 auto; min-width:280px; max-width:100%; }
  #resCol { flex:1 1 480px; min-width:320px; }
  /* on the 2-column layout the capture column sticks so the warehouse image
     follows while the long results list scrolls; a tall image scrolls inside. */
  @media (min-width:700px) {
    #capCol { position:sticky; top:.8rem; align-self:flex-start; }
    #capCol #scanWrap { max-height:calc(100vh - 1.6rem); overflow:auto; }
  }

  /* capture area */
  /* fixed display box so the warehouse image is the SAME on-screen size at any
     in-game scale (≈ the size a 1.5-scale capture used to show); the canvas
     fills it and overlays are %-positioned, so alignment is unaffected */
  #scanBox { position:relative; display:block; width:560px; max-width:100%; background:#000;
             border:1px solid #30363d; border-radius:.4rem; overflow:hidden; }
  #scanCanvas { display:block; image-rendering:pixelated; width:100%; }
  .legend { font-size:.7rem; color:#9aa4b8; margin:.4rem 0; }
  .legend span { margin-right:.9rem; white-space:nowrap; }
  /* prominent click-to-fix hint shown above the warehouse image */
  .legend .hint { white-space:normal; margin:0; font-size:1rem; font-weight:800; color:#ffd60a;
                  text-shadow:0 0 .35rem rgba(255,214,10,.55); }
  .dot { display:inline-block; width:.55rem; height:.55rem; border-radius:.15rem; vertical-align:middle;
         margin-right:.25rem; border:2px solid; }

  /* cell overlays: confirmed cells keep original brightness + a FLASHY border
     in the item's price-band colour; unconfirmed cells show only a ? badge */
  .ov { position:absolute; box-sizing:border-box; cursor:pointer; border-radius:.25rem; }
  .ov.ok { border:3px solid var(--bc,#3a4150); }
  .ov.ok.glow { box-shadow:0 0 .35rem var(--bc); }
  .ov.ok.hot { border-width:4px; animation:hotpulse 1.3s ease-in-out infinite; }
  @keyframes hotpulse { 0%,100% { box-shadow:0 0 .3rem var(--bc); }
                        50% { box-shadow:0 0 .9rem .2rem var(--bc), inset 0 0 .35rem var(--bc); } }
  .ov .spark { position:absolute; top:-.65rem; left:-.5rem; font-size:.9rem;
               filter:drop-shadow(0 0 .25rem #ffd166); animation:qpulse 1.3s ease-in-out infinite; }
  .ov.skip { border:2px solid rgba(110,118,129,.45); }
  /* unconfirmed cells: yellow frame (matches the ? badge) pulsing in sync with it */
  .ov.review { border:3px solid #ffd60a; animation:reviewpulse 1.1s ease-in-out infinite; }
  @keyframes reviewpulse { 0%,100% { box-shadow:0 0 .25rem rgba(255,214,10,.5); }
                           50% { box-shadow:0 0 .7rem .1rem rgba(255,214,10,.9); } }
  .ov .badge { position:absolute; top:-0.55rem; right:-0.55rem; font-size:.85rem; line-height:1;
               padding:.2rem .36rem; border-radius:50%; background:#ffd60a; color:#1a1400;
               font-weight:900; box-shadow:0 0 .5rem rgba(255,214,10,.95);
               animation:qpulse 1.1s ease-in-out infinite; }
  @keyframes qpulse { 0%,100% { transform:scale(1); } 50% { transform:scale(1.25); } }
  /* inline copy of the cell's ? badge, for use inside help text */
  .qmark { display:inline-block; width:1.3em; height:1.3em; line-height:1.3em; text-align:center;
           border-radius:50%; background:#ffd60a; color:#1a1400; font-weight:900; font-size:.85em;
           vertical-align:middle; box-shadow:0 0 .3rem rgba(255,214,10,.85); }
  .ov:hover { background:rgba(111,177,255,.22); }
  /* table-row hover -> spotlight matching warehouse cells */
  .ov.hl { outline:3px solid #fff; box-shadow:0 0 .9rem .2rem rgba(255,255,255,.85);
           z-index:5; animation:none; }
  .ov.dim { opacity:.25; }

  /* mode toggle + banner */
  .seg { display:inline-flex; border:1px solid #30363d; border-radius:.5rem; overflow:hidden; }
  .seg button { border-radius:0; margin:0; font-size:.8rem; padding:.45rem .9rem; }
  #banner { margin:.7rem 0; padding:.6rem .9rem; border-radius:.6rem; font-size:.78rem; line-height:1.55; }
  #banner.base { background:#2b2347; border:1px solid #5a4a80; color:#d6c6ff; }
  #banner.cur  { background:#1b2a1e; border:1px solid #2ea043; color:#aff5b4; }
  #banner a { color:#fff; }
  #staleAlert { margin:0 0 .3rem; padding:.6rem .9rem; border-radius:.6rem; font-size:.82rem;
    line-height:1.55; background:#3a2e12; border:1px solid #b8860b; color:#ffe08a; }
  #staleAlert a { color:#fff; text-decoration:underline; white-space:nowrap; }
  #staleAlert .x { float:right; cursor:pointer; color:#ffe08a; font-weight:700; margin-left:.6rem; opacity:.8; }
  #staleAlert .x:hover { opacity:1; }

  /* ⓘ help marker with an INSTANT custom tooltip (native title is delayed) */
  .info { position:relative; display:inline-block; margin-left:.2rem; cursor:help;
          color:#ffd60a; font-weight:700; font-size:.85em; }
  .info::after { content:attr(data-tip); position:absolute; right:0; top:135%;
          width:max-content; max-width:15rem; white-space:normal; text-align:left;
          background:#0d1117; border:1px solid #30363d; border-radius:.4rem; padding:.4rem .55rem;
          font-size:.72rem; font-weight:400; color:#cdd6e4; line-height:1.5;
          box-shadow:0 .3rem 1rem rgba(0,0,0,.55); z-index:60;
          opacity:0; visibility:hidden; }
  .info:hover::after { opacity:1; visibility:visible; }   /* no transition = instant */
  /* results table */
  table { width:100%; border-collapse:collapse; font-size:.82rem; }
  th, td { padding:.45rem .55rem; text-align:right; border-bottom:1px solid #21262d; white-space:nowrap; }
  th { color:#8b93a7; font-weight:600; cursor:pointer; user-select:none; }
  th:hover { color:#cdd6e4; } th.on { color:#6fb1ff; }
  th.l, td.l { text-align:left; }
  tr:hover td { background:#161c26; }
  img.icon { width:2.2rem; height:2.2rem; image-rendering:pixelated; vertical-align:middle;
             background:#000; border-radius:.3rem; }
  a.name { color:#e6e9ef; text-decoration:none; font-weight:700; }
  a.name:hover { color:#6fb1ff; text-decoration:underline; }
  /* premium price-tier bar behind the item name: solid tier-colour left edge
     (instant tier ID) + a glossy gradient sheen; --lc/--la/--lb set per-row. */
  td.lux { position:relative; border-radius:.4rem; border-left:4px solid var(--lc);
    background:
      linear-gradient(180deg, rgba(255,255,255,.14), rgba(255,255,255,0) 55%),
      linear-gradient(90deg, transparent, var(--la) 42%, var(--lb)); }
  td.lux.lux-hi { box-shadow: inset 0 1px 0 rgba(255,255,255,.30), 0 0 .6rem -.1rem var(--lb); }
  /* keep the bar visible on hover instead of the flat row highlight wiping it */
  tr:hover td.lux {
    background:
      linear-gradient(180deg, rgba(255,255,255,.20), rgba(255,255,255,0) 55%),
      linear-gradient(90deg, rgba(255,255,255,.05), var(--la) 42%, var(--lb)); }
  .rar { font-size:.65rem; }
  .total { font-size:.95rem; margin:.6rem 0; }
  .total b { font-size:1.7rem; letter-spacing:.01em; }
  /* 💎 top-find callout: a little loot-reveal moment for your best item */
  #topFind { display:none; position:relative; overflow:hidden; margin:.5rem 0 .7rem;
             padding:.55rem .9rem; border-radius:.7rem; background:#161324;
             border:2px solid #5a4a80; font-size:.9rem; align-items:center; gap:.6rem; }
  /* shine sweep: gentle and infrequent so it doesn't nag on a side monitor */
  #topFind::after { content:""; position:absolute; top:0; left:-60%; width:45%; height:100%;
    background:linear-gradient(115deg,transparent,rgba(255,255,255,.10),transparent);
    animation:sweep 7s ease-in-out infinite; pointer-events:none; }
  @keyframes sweep { 0%,70% { left:-60%; } 92%,100% { left:130%; } }
  #topFind img { width:2.4rem; height:2.4rem; image-rendering:pixelated; border-radius:.3rem;
                 background:#000; vertical-align:middle; }

  /* ⑱ price bands — escalating flash (10 tiers) */
  /* Diablo-style tier ramp — the colours every ARPG player feels in their gut:
     gray -> white -> blue (magic) -> yellow (rare) -> green (set) ->
     ORANGE (legendary) -> GOLD (unique) -> RED (primal) */
  .p0 { color:#6e7681; }                                              /* <100  trash-gray */
  .p1 { color:#e6e9ef; }                                              /* 100+  common white */
  .p2 { color:#7cb4ff; }                                              /* 500+  magic blue */
  .p3 { color:#9cc8ff; text-shadow:0 0 .3rem rgba(124,180,255,.4); }  /* 1k+   strong blue */
  .p4 { color:#ffff64; text-shadow:0 0 .3rem rgba(255,255,100,.35); } /* 2k+   rare yellow */
  .p5 { color:#ffe14a; text-shadow:0 0 .4rem rgba(255,225,74,.5); }   /* 3k+   bright yellow */
  .p6 { color:#3dd463; text-shadow:0 0 .4rem rgba(61,212,99,.55); font-weight:700; }   /* 5k+  set green */
  /* 10k+ : escalating "luxury" — an animated shimmering gold gradient (text at
     10k, then a shimmering pill at 30k, then the rainbow pill at 50k+) */
  .p7 { font-weight:800; background:linear-gradient(90deg,#ff8000,#ffe680,#ff8000,#ffd166);
        background-size:250% 100%; -webkit-background-clip:text; background-clip:text;
        color:transparent; animation:shine 2.6s linear infinite;
        filter:drop-shadow(0 0 .45rem rgba(255,160,0,.7)); }                  /* 10k+ shimmering gold */
  .p8 { display:inline-block; font-weight:800; color:#1a1400; padding:.04rem .5rem; border-radius:.5rem;
        background:linear-gradient(90deg,#ffcf40,#fff1b0,#ffcf40); background-size:250% 100%;
        animation:shine 2.4s linear infinite;
        box-shadow:0 0 .55rem rgba(255,200,40,.7), inset 0 0 .25rem rgba(255,255,255,.35); } /* 30k+ shimmering gold pill */
  /* ¥50k+ : rare SPECIAL tier — a glowing gradient pill so it clearly stands
     apart from the normal colour tiers */
  .p9 { display:inline-block; font-weight:900; color:#1a1400;
        background:linear-gradient(90deg,#ff4040,#ff8000,#ffd700,#ff8000,#ff4040);
        background-size:300% 100%; animation:shine 2.2s linear infinite;
        padding:.05rem .5rem; border-radius:.6rem;
        box-shadow:0 0 .5rem rgba(255,160,0,.85), inset 0 0 .3rem rgba(255,255,255,.4); }
  @keyframes shine { 0% { background-position:0% 0; } 100% { background-position:300% 0; } }
  /* the unit price is the headline number -> bigger & bold (colour = its tier).
     take-home / total stay a clean, clearly-readable light grey (were dim grey). */
  td.num1 { font-size:1.08em; font-weight:700; }
  .num { color:#cdd6e4; font-weight:600; }

  .pill { display:inline-block; font-size:.62rem; padding:.08rem .45rem; border-radius:.6rem;
          margin-left:.3rem; cursor:help; }
  .pill.never { background:linear-gradient(135deg,#3a2f00,#5c4a00); color:#ffd166;
                border:1px solid #ffd166; text-shadow:0 0 .3rem rgba(255,209,102,.8);
                animation:pulse2 1.6s ease-in-out infinite; }
  @keyframes pulse2 { 0%,100% { box-shadow:0 0 .2rem rgba(255,209,102,.4); }
                      50% { box-shadow:0 0 .6rem rgba(255,209,102,.9); } }
  .pill.info { background:#262c36; color:#9fb4d8; }

  /* ⑪ gacha panel */
  #gacha { margin-top:1.2rem; background:#11161f; border:1px solid #30363d; border-radius:.8rem; padding:.9rem 1rem; }
  #gacha h2 { font-size:1rem; margin:.1rem 0 .4rem; }
  #gacha table { font-size:.78rem; }
  .verdict-spin { color:#7ee787; font-weight:800; }
  .verdict-sell { color:#ffa657; font-weight:800; }
  /* current price-basis chip in the gacha panel (matches the mode banner colours) */
  .bchip { display:inline-block; padding:.12rem .55rem; border-radius:.6rem; font-weight:700; font-size:.82rem; }
  .bchip.cur  { background:#1b2a1e; border:1px solid #2ea043; color:#aff5b4; }
  .bchip.base { background:#2b2347; border:1px solid #5a4a80; color:#d6c6ff; }
  /* ⚖️ "exclude listing-restricted top grades" toggle (next to 価格を更新) */
  #gExBtn { font-size:.78rem; padding:.3rem .75rem; background:#21262d; color:#c9d1d9; border:1px solid #3d444d; border-radius:.5rem; cursor:pointer; }
  #gExBtn.exon { background:#3a2a12; border-color:#bb8009; color:#ffd596; box-shadow:0 0 .35rem rgba(187,128,9,.35); }
  .gex-note { color:#ffd596; margin-top:.25rem; }

  /* how-to card (top of the results column) — collapsible <details> so the
     tutorial stays available after a scan. Highlights green once connected. */
  #guide { background:#161b24; border:1px solid #30363d; border-radius:.8rem;
           padding:.8rem 1rem; margin-bottom:1rem; }
  #guide > summary { font-size:.95rem; font-weight:700; cursor:pointer; list-style:none; outline:none; }
  #guide > summary::-webkit-details-marker { display:none; }
  #guide > summary::before { content:"▶"; display:inline-block; margin-right:.45rem;
                             font-size:.75em; color:#9aa4b8; transition:transform .15s; }
  #guide[open] > summary::before { transform:rotate(90deg); }
  #guide ol { margin:.55rem 0 .2rem; padding-left:1.4rem; font-size:.85rem; line-height:1.9; }
  #guide li.cur { color:#aff5b4; font-weight:700; }
  #guide li.cur::marker { color:#2ea043; }
  #guide.connected { border-color:#2ea043; box-shadow:0 0 .6rem rgba(46,160,67,.28); }
  #guideNote { margin-top:.35rem; font-size:.82rem; color:#ffa657; font-weight:600; }
  /* ㉖ about/features */
  .feat { background:#161c26; border:1px solid #21262d; border-radius:.6rem; padding:.5rem .8rem; font-size:.82rem; }
  .feat b { color:#e6e9ef; }
  /* button-name references inside the steps — each colored like its real button */
  .btnref { display:inline-block; background:#2d6cdf; color:#fff; font-weight:700;
            padding:.05rem .45rem; border-radius:.4rem; white-space:nowrap; }   /* 倉庫を査定する */
  .btnref.bconn { background:#1f6f3f; }   /* ゲーム画面に接続 = 接続ボタン(緑) */
  .btnref.bgame { background:#ffd60a; color:#1a1400; }   /* ゲーム内での操作(黄) — quickStepsの①と色を統一 */
  /* grade unknown -> suggest "not tradeable / ignore" in the popover */
  #popIgnore.suggest { background:#4a3a00; color:#ffd166; border:1px solid #9e7d00;
                       animation:qpulse 1.4s ease-in-out infinite; }
  /* ㉔ warehouse page picker (1-7 + ?) */
  #pageSel { display:flex; align-items:center; flex-wrap:wrap; gap:.25rem; max-width:100%; }
  #pageSel .pglabel { font-size:.72rem; color:#8b93a7; margin-right:.15rem; }
  /* hint on its own full-width line so the (long) text wraps INSIDE the column
     instead of widening it and shoving the results column */
  #pageSel .pghint { flex-basis:100%; margin:.15rem 0 0; font-size:.68rem; color:#e0a200;
                     line-height:1.3; overflow-wrap:anywhere; }
  .pgb { min-width:1.9rem; padding:.25rem .35rem; font-size:.78rem; line-height:1;
         background:#21262d; color:#c9d1d9; border:1px solid #30363d; border-radius:.3rem; cursor:pointer; }
  .pgb:hover { border-color:#6fb1ff; }
  .pgb.has { border-color:#3b7a3b; }                 /* a page already stocked */
  .pgb.has::after { content:"●"; font-size:.5rem; color:#56a356; margin-left:.15rem; vertical-align:middle; }
  .pgb.sel { background:#e0a200; color:#1a1a1a; border-color:#e0a200; font-weight:700; }  /* current pick */
  /* ㉔ stocked warehouse snapshots */
  /* fixed-size thumbnails (auto-fill wraps on narrow screens). object-fit:cover
     keeps a uniform grid so a wide single-row / tall single-column capture can't
     blow the thumbnail (and thus the capture column) out and shove the results. */
  #stockStrip { display:grid; grid-template-columns:repeat(auto-fill, 104px); gap:.4rem; margin-top:.4rem; }
  .stockcard { position:relative; }
  .stockcard img { width:104px; height:74px; object-fit:cover; display:block; cursor:pointer; border:1px solid #30363d; border-radius:.3rem; background:#000; }
  .stockcard:hover img { border-color:#6fb1ff; }
  .stockcard.active img { border:2px solid #ffd60a; box-shadow:0 0 .4rem rgba(255,214,10,.6); }
  /* plan-hover preview: white spotlight (matches the image's .ov.hl) marks the page
     the left image just switched to, so the page-number caption tells you which one */
  .stockcard.peek img { border:2px solid #fff; box-shadow:0 0 .6rem .12rem rgba(255,255,255,.8); }
  .stockcard.peek .cap { background:#fff; color:#111; font-weight:700; }
  /* in the listing-plan view drop the gold "current page" marker — but keep the white
     peek when the editable page is itself the one being shown (active + peek coincide) */
  #stockStrip.planview .stockcard.active:not(.peek) img { border:1px solid #30363d; box-shadow:none; }
  .stockcard .cap { position:absolute; left:.15rem; top:.15rem; background:rgba(0,0,0,.65);
                    color:#ffd166; font-size:.62rem; padding:.05rem .3rem; border-radius:.25rem; }
  .stockcard .del { position:absolute; right:.1rem; top:.1rem; width:1.1rem; height:1.1rem;
                    line-height:1rem; text-align:center; border-radius:50%; background:rgba(0,0,0,.7);
                    color:#ff7b72; font-size:.85rem; font-weight:900; cursor:pointer; border:1px solid #ff7b7255; }
  .stockcard .del:hover { background:#ff7b72; color:#fff; }

  /* popover */
  #pop { position:fixed; z-index:60; display:none; width:21rem; max-width:95vw; background:#0d1117;
         border:1px solid #30363d; border-radius:.7rem; padding:.8rem; box-shadow:0 .6rem 2rem rgba(0,0,0,.65); }
  #pop h3 { margin:0 0 .5rem; font-size:.8rem; color:#9aa4b8; cursor:move; }
  #pop { cursor:move; }
  #pop input, #pop button, #pop .cand, #pop .chip { cursor:auto; }
  #pop .chip, #pop .cand, #pop button, #pop .x { cursor:pointer; }
  #pop .hd { display:flex; gap:.6rem; align-items:center; margin-bottom:.5rem; }
  .thumb { width:3.4rem; height:3.4rem; image-rendering:pixelated; border-radius:.3rem; background:#000;
           flex:0 0 auto; border:1px solid #30363d; }
  /* show ~6 candidates, scroll for the rest */
  #popCands { max-height:18.5rem; overflow-y:auto; }
  .cand { display:flex; align-items:center; gap:.5rem; padding:.4rem; border-radius:.4rem;
          margin-bottom:.3rem; background:#161c26; border:2px solid transparent; }
  .cand.top { border-color:#6fb1ff; background:#13202f;
              box-shadow:0 0 .35rem rgba(111,177,255,.35); }
  .cand img { width:2.1rem; height:2.1rem; image-rendering:pixelated; background:#000; border-radius:.3rem; }
  .cand .cb { flex:1; min-width:0; }
  .cand .cbase { font-weight:700; font-size:.78rem; }
  .cand .cd { font-size:.65rem; color:#8b93a7; }
